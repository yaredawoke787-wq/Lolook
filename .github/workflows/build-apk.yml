name: Build Android APKs

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding existing debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Generating a fresh robust debug.keystore..."
            keytool -genkey -v -keystore debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build App & Admin APKs (Debug & Release)
        run: |
          ./gradlew :app:assembleDebug :app:assembleRelease :admin:assembleDebug :admin:assembleRelease

      - name: Prepare and Organize Built APKs
        run: |
          mkdir -p output_apks
          
          # Copy Client App APKs
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk output_apks/Teke_Man_Promotion_Debug.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk output_apks/Teke_Man_Promotion_Release.apk
          fi
          
          # Copy Admin App APKs
          if [ -f admin/build/outputs/apk/debug/admin-debug.apk ]; then
            cp admin/build/outputs/apk/debug/admin-debug.apk output_apks/Teke_Man_Promotion_Admin_Debug.apk
          fi
          if [ -f admin/build/outputs/apk/release/admin-release.apk ]; then
            cp admin/build/outputs/apk/release/admin-release.apk output_apks/Teke_Man_Promotion_Admin_Release.apk
          fi

      - name: Upload Built APKs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Teke_Man_Promotion_APKs
          path: output_apks/*.apk
          retention-days: 7
